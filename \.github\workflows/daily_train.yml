name: AQI Daily Training Pipeline

on:
  # Runs automatically every night at 2 AM
  schedule:
    - cron: '0 21 * * *'   # UTC 9pm = Pakistan 2am

  # Can also run manually
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" >> .env
          echo "AQICN_API_KEY=${{ secrets.AQICN_API_KEY }}"            >> .env
          echo "CITY_NAME=${{ secrets.CITY_NAME || 'Lahore' }}"        >> .env
          echo "COUNTRY_CODE=PK"                                        >> .env

      - name: Fetch latest AQI data
        run: python src/features.py

      - name: Train model
        run: python src/train.py

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: |
            models/best_model.joblib
            models/scaler.joblib
            models/metadata.json
          retention-days: 30

      - name: Upload feature store
        uses: actions/upload-artifact@v4
        with:
          name: feature-store
          path: data/feature_store.csv
          retention-days: 30
